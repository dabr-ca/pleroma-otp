name: Build Pleroma OTP

run-name: Build Pleroma ${{ inputs.pleroma_tag }} OTP arm64

'on':
  workflow_dispatch:
    inputs:
      pleroma_tag:
        description: Upstream Pleroma git tag to build, for example v2.10.2
        required: true
        default: v2.10.2
        type: string

permissions:
  contents: write

concurrency:
  group: pleroma-otp-${{ inputs.pleroma_tag }}
  cancel-in-progress: false

env:
  UPSTREAM_REPO: https://git.pleroma.social/pleroma/pleroma.git
  BUILD_IMAGE: docker.io/hexpm/elixir-arm64:1.17.3-erlang-27.3.4.2-ubuntu-noble-20250716
  MIX_ENV: prod
  VIX_COMPILATION_MODE: PLATFORM_PROVIDED_LIBVIPS
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: Build arm64 OTP tarball
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    container:
      image: docker.io/hexpm/elixir-arm64:1.17.3-erlang-27.3.4.2-ubuntu-noble-20250716

    defaults:
      run:
        shell: bash

    steps:
      - name: Install system dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            erlang-dev \
            git \
            gzip \
            libmagic-dev \
            libvips-dev \
            tar
          rm -rf /var/lib/apt/lists/*

      - name: Clone upstream tag
        env:
          PLEROMA_TAG: ${{ inputs.pleroma_tag }}
        run: |
          set -euo pipefail

          tag="${PLEROMA_TAG}"
          if [[ ! "${tag}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Tag must contain only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

          if ! git ls-remote --exit-code --tags --refs "${UPSTREAM_REPO}" "refs/tags/${tag}" >/dev/null; then
            echo "::error::Upstream tag '${tag}' was not found in ${UPSTREAM_REPO}."
            exit 1
          fi

          git clone --depth 1 --branch "${tag}" "${UPSTREAM_REPO}" pleroma
          upstream_sha="$(git -C pleroma rev-parse HEAD)"
          upstream_short_sha="$(git -C pleroma rev-parse --short=8 HEAD)"

          echo "UPSTREAM_SHA=${upstream_sha}" >> "${GITHUB_ENV}"
          echo "UPSTREAM_SHORT_SHA=${upstream_short_sha}" >> "${GITHUB_ENV}"
          echo "Checked out ${tag} at ${upstream_sha}"

      - name: Show build environment
        run: |
          set -euo pipefail
          test "$(uname -m)" = "aarch64"
          elixir --version
          erl -noshell -eval 'erlang:display(erlang:system_info(system_architecture)), halt().'

      - name: Build OTP release
        working-directory: pleroma
        env:
          PLEROMA_BUILD_BRANCH: stable
        run: |
          set -euo pipefail
          echo "import Config" > config/prod.secret.exs
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mkdir -p release
          mix release --path release

      - name: Package tarballs
        env:
          PLEROMA_TAG: ${{ inputs.pleroma_tag }}
        run: |
          set -euo pipefail

          versioned_tarball="pleroma-otp-${PLEROMA_TAG}-arm64.tar.gz"

          tar -C pleroma/release -czf "${versioned_tarball}" .

          tar -tzf "${versioned_tarball}" | head -50
          sha256sum "${versioned_tarball}"

          echo "VERSIONED_TARBALL=${versioned_tarball}" >> "${GITHUB_ENV}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.pleroma_tag }}
          target_commitish: ${{ github.sha }}
          name: Pleroma OTP ${{ inputs.pleroma_tag }} arm64
          make_latest: 'true'
          overwrite_files: true
          body: |
            Upstream Pleroma tag: `${{ inputs.pleroma_tag }}`
            Upstream Pleroma commit: `${{ env.UPSTREAM_SHA }}`
            Build image: `${{ env.BUILD_IMAGE }}`

            Stable versioned URL:
            `${{ github.server_url }}/${{ github.repository }}/releases/download/${{ inputs.pleroma_tag }}/${{ env.VERSIONED_TARBALL }}`
          files: ${{ env.VERSIONED_TARBALL }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
